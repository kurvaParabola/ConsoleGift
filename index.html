<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quite Present to You</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <audio id="bday-music">
        <source src="hbd.mp3" type="audio/mpeg">
    </audio>

    <div class="console-body">
        <img src="sunflower.png" class="body-accent-flower" alt="decor">
        <div class="screen-container">
            <div class="screen-inner">

                <canvas id="confetti-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25;"></canvas>

                <div id="start-screen" style="z-index: 20;">
                    <h2 class="welcome-text">Hallo imel!</h2>
                    <p class="sub-text">are you ready?</p>
                    <button class="start-btn" onclick="startLoading()">START</button>
                </div>

                <div id="loading-screen" class="hidden" style="z-index: 20;">
                    <p class="loading-text">LEVELING UP...</p>
                    <h1 class="counter-text"><span id="age-counter">0</span></h1>
                    <div class="loading-bar-container">
                        <div id="bar-fill" class="loading-bar-fill"></div>
                    </div>
                </div>

                <div id="wish-screen" class="hidden" style="z-index: 20;">
                    <p id="stage-indicator" class="hidden" style="font-size: 1rem; color: #8d6e63; margin: 0;">STAGE 1/4</p>
                    
                    <div id="stage-content-area">
                        <h1 id="stage-title" class="birthday-text">HAPPY BIRTHDAY<br>IMEL!</h1>

                        <div class="cake-container" id="cake-wrapper">
                            <img src="cake.png" alt="Cake" class="cake-img">
                        </div>
                        <p id="wait-text" class="wait-instruction"><i>Wait till the song ends...</i></p>
                    </div>

                    <div id="message-container" class="hidden">
                        <p id="stage-message" style="font-size: 1.5rem; color: #646cc3; line-height: 1.2;"></p>
                    </div>

                    <button id="next-btn" class="next-btn-small hidden" onclick="nextStage()">NEXT</button>
                </div>

                <div class="scanlines"></div>
            </div>
        </div>

        <div class="ui-panel">
            <div class="decoration-dots">[] []</div>
            <div class="decoration-dots">[] []</div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
